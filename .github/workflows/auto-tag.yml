name: Auto-tag on version bump

on:
  push:
    branches: [main]
    paths: [package.json]

permissions:
  contents: write

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version change
        id: version
        run: |
          CURRENT=$(jq -r .version package.json)
          PREVIOUS=$(git show HEAD~1:package.json 2>/dev/null | jq -r .version 2>/dev/null || echo "")
          echo "current=v${CURRENT}" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if tag exists
        if: steps.version.outputs.changed == 'true'
        id: tag-check
        run: |
          TAG="${{ steps.version.outputs.current }}"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: steps.version.outputs.changed == 'true' && steps.tag-check.outputs.exists == 'false'
        run: |
          TAG="${{ steps.version.outputs.current }}"
          git tag "$TAG"
          git push origin "$TAG"
          echo "✅ Created tag ${TAG}"
